{% extends "base.html" %}
{% block title %}{% if event %}Edit Event{% else %}Create Event{% endif %}{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">{% if event %}Edit Event{% else %}Create Event{% endif %}</h1>
    <a href="/admin/events" class="text-indigo-600 hover:underline">&larr; Back to Events</a>
</div>

<div class="bg-white rounded-lg shadow p-6 max-w-lg">
    <form method="post" action="{% if event %}/admin/events/{{ event.id }}/edit{% else %}/admin/events/new{% endif %}">
        <div class="mb-4">
            <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Title</label>
            <input type="text" name="title" id="title" required
                   value="{{ event.title if event else '' }}"
                   class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div class="mb-4">
            <label for="event_type" class="block text-sm font-medium text-gray-700 mb-1">Event Type</label>
            <select name="event_type" id="event_type" required
                    class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                <option value="speed_talk" {% if event and event.event_type == 'speed_talk' %}selected{% endif %}>Speed Talk (1 min)</option>
                <option value="long_speech" {% if event and event.event_type == 'long_speech' %}selected{% endif %}>Long Speech (5-15 min)</option>
                <option value="debate" {% if event and event.event_type == 'debate' %}selected{% endif %}>Debate (10-20 min)</option>
            </select>
        </div>

        <div class="mb-4">
            <label for="scheduled_date" class="block text-sm font-medium text-gray-700 mb-1">Scheduled Date & Time</label>
            <input type="datetime-local" name="scheduled_date" id="scheduled_date" required
                   value="{{ event.scheduled_date.strftime('%Y-%m-%dT%H:%M') if event else '' }}"
                   class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div class="mb-6">
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description (optional)</label>
            <textarea name="description" id="description" rows="3"
                      class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">{{ event.description if event and event.description else '' }}</textarea>
        </div>

        <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">
            {% if event %}Update Event{% else %}Create Event{% endif %}
        </button>
    </form>
</div>
{% endblock %}
